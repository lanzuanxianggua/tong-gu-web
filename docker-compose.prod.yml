version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/tonggu-backend:latest
    container_name: tonggu-backend
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY:-8q3!z7@y9$x2#v4%b6^n5&m1*k8(j0)p2}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DEBUG: 'False'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    networks:
      - tonggu-network
    security_opt:
      - no-new-privileges:true
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 backend.wsgi:application"

  nginx:
    image: nginx:alpine
    container_name: tonggu-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - tonggu-network

networks:
  tonggu-network:
    driver: bridge

volumes:
  media_data:
  logs_data:
