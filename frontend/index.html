<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1612" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- SEO & Meta -->
    <title>铜鼓智能识别与数字化保护平台</title>
    <meta name="description" content="基于AI的铜鼓智能识别与数字化保护平台，传承千年文化，融合现代科技" />
    <meta name="keywords" content="铜鼓,智能识别,数字化保护,文化遗产,AI识别" />
    <meta name="author" content="TongGu Team" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/src/assets/tonggu_logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/tonggu_logo.png" />
    
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Critical CSS - Prevent FOUC (Flash of Unstyled Content) -->
    <style>
      /* Critical inline styles for instant rendering */
      html {
        background-color: #1a1612;
        color: #e8dcc8;
      }
      
      body {
        margin: 0;
        padding: 0;
        opacity: 0;
        animation: fadeIn 0.3s ease-in forwards;
        animation-delay: 0.1s;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      #app {
        min-height: 100vh;
      }
      
      /* Loading state */
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1612;
        z-index: 9999;
      }
      
      .initial-loading::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: #c9a227;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Initial loading indicator (removed by App.vue) -->
    <div class="initial-loading" id="initial-loader"></div>
    
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    
    <!-- Remove initial loader after app mounts -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loader.remove(), 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
